<!DOCTYPE html>
<html>
<head>
    <title>URL Shortener</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>🔗 URL Shortener</h1>
        <form method="POST">
            <input type="text" name="original_url" placeholder="Enter a long URL" required>
            <button type="submit">Shorten</button>
        </form>

        {% if short_url %}
            <p class="success">✅ URL shortened successfully!</p>
            <p><strong>Shortened URL:</strong></p>
            <div class="result">
                <input type="text" value="{{ request.host_url }}{{ short_url }}" readonly>
                <button onclick="copyToClipboard()">📋 Copy</button>
            </div>
            <br>
            <a href="{{ url_for('analytics') }}">📊 View Analytics</a>
        {% endif %}
    </div>

    <script>
        function copyToClipboard() {
            const input = document.querySelector('.result input');
            input.select();
            document.execCommand("copy");
        }
    </script>
</body>
</html>
