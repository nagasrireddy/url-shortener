<!DOCTYPE html>
<html>
<head>
    <title>URL Analytics</title>
    <style>
        table {
            border-collapse: collapse;
            width: 90%;
            margin: 20px auto;
        }
        th, td {
            border: 1px solid #999;
            padding: 10px;
            text-align: left;
        }
        th {
            background-color: #3c8dbc;
            color: white;
        }
    </style>
</head>
<body>
    <h2 style="text-align:center;">📈 URL Analytics</h2>
    <table>
        <tr>
            <th>Short Code</th>
            <th>Original URL</th>
            <th>Clicks</th>
            <th>Created At</th>
        </tr>
        {% for url in urls %}
        <tr>
            <td>{{ url.short_code }}</td>
            <td>{{ url.original_url }}</td>
            <td>{{ url.clicks }}</td>
            <td>{{ url.created_at.strftime('%Y-%m-%d %H:%M:%S') }}</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
